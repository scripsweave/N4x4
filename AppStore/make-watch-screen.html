<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>N4x4 watch screen</title>
<style>
/* Frameless Apple Watch screen for the App Store watch slot, matching
   WatchTimerView (and the website watch mockup, per the parity rule). Fills
   the window; render at each required size with headless Chrome, e.g.:
   chrome --headless=new --screenshot=watch-ultra3-422x514.png \
          --window-size=422,514 --force-device-scale-factor=1 file://.../make-watch-screen.html
   Shows a below-zone reading (148 in a 158-172 zone), so the orange number and
   the "Speed Up" cue agree with each other and with the app's zone colouring. */
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100vw; height: 100vh; background: #000; overflow: hidden; }
body {
  font-family: -apple-system, "SF Pro Rounded", "SF Pro Display", "Helvetica Neue", sans-serif;
  -webkit-font-smoothing: antialiased;
  display: flex; flex-direction: column; align-items: center;
  padding: 3vh 0 3vh;
  color: #fff;
}
.phase { color: #FF9400; font-weight: 800; font-size: 5.7vw; letter-spacing: 0.5px; }
.interval { color: #8b8b90; font-weight: 600; font-size: 4.7vw; margin-top: 0.3vh; }
.ring-wrap { position: relative; width: 50vw; height: 50vw; margin-top: 1vh; }
.ring-wrap svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.ring-center {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.bpm-num { color: #FF9400; font-weight: 800; font-size: 20vw; line-height: 0.9; letter-spacing: -1.5px; }
.bpm-lbl { color: #8b8b90; font-weight: 700; font-size: 4.4vw; letter-spacing: 3px; margin-top: 0.3vh; }
.cue { color: #FF9400; font-weight: 800; font-size: 6.4vw; margin-top: 1.4vh; }
.target { color: #6f6f74; font-weight: 600; font-size: 4.2vw; letter-spacing: 0.5px; margin-top: 0.5vh; }
.controls { display: flex; gap: 3.2vw; margin-top: auto; }
.btn {
  width: 24vw; height: 11vw; border-radius: 3.6vw;
  background: rgba(255,255,255,0.12);
  display: flex; align-items: center; justify-content: center;
}
.btn svg { width: 7.4vw; height: 7.4vw; fill: #fff; }
</style>
</head>
<body>
  <div class="phase">HIGH INTENSITY</div>
  <div class="interval">INTERVAL 3 / 4 · 4:00</div>

  <div class="ring-wrap">
    <svg viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="42" fill="none" stroke="#2b2b2e" stroke-width="8"/>
      <circle cx="50" cy="50" r="42" fill="none" stroke="#FF9400" stroke-width="8"
              stroke-linecap="round" stroke-dasharray="263.9"
              stroke-dashoffset="92" />
    </svg>
    <div class="ring-center">
      <div class="bpm-num">148</div>
      <div class="bpm-lbl">BPM</div>
    </div>
  </div>

  <div class="cue">▲ SPEED UP</div>
  <div class="target">TARGET 158–172</div>

  <div class="controls">
    <div class="btn">
      <svg viewBox="0 0 24 24"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>
    </div>
    <div class="btn">
      <svg viewBox="0 0 24 24"><path d="M5 5l8 7-8 7V5zM15 5h3v14h-3z"/></svg>
    </div>
  </div>
</body>
</html>
